name: CI/CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for deployment
        required: false
        default: us-east-1
      sam_stack_name:
        description: CloudFormation stack name
        required: false
        default: tweeter-server
      sam_s3_prefix:
        description: SAM deployment artifact prefix
        required: false
        default: tweeter-server

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Debug GitHub context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.17.0
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Lint source
        run: npm run lint

      - name: Compile shared package
        run: npm --workspace tweeter-shared run compile

      - name: Run Jest tests
        run: npm run test --workspaces --if-present

      - name: Build all packages
        run: npm run build:all

  deploy:
    name: Deploy backend and frontend
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: us-east-1
      SAM_STACK_NAME: tweeter-server
      SAM_S3_PREFIX: tweeter-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Debug GitHub context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.17.0
          cache: npm

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      # Conventional setup: prefer GitHub OIDC with an assumable IAM role.
      # Required secret: AWS_ROLE_TO_ASSUME
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ github.event.inputs.aws_region || env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Install workspace dependencies
        run: npm ci

      - name: Build SAM artifacts
        run: npm --workspace tweeter-server run sam:build

      - name: SAM deploy
        working-directory: tweeter-server
        env:
          EFFECTIVE_AWS_REGION: ${{ github.event.inputs.aws_region || env.AWS_REGION }}
          EFFECTIVE_SAM_STACK_NAME: ${{ github.event.inputs.sam_stack_name || env.SAM_STACK_NAME }}
          EFFECTIVE_SAM_S3_PREFIX: ${{ github.event.inputs.sam_s3_prefix || env.SAM_S3_PREFIX }}
        run: |
          set -euo pipefail

          deploy_cmd=(
            sam deploy
            --config-file samconfig.toml
            --config-env ci
            --template-file .aws-sam/build/template.yaml
            --stack-name "${EFFECTIVE_SAM_STACK_NAME}"
            --region "${EFFECTIVE_AWS_REGION}"
            --capabilities CAPABILITY_NAMED_IAM
            --resolve-s3
            --s3-prefix "${EFFECTIVE_SAM_S3_PREFIX}"
            --no-confirm-changeset
            --no-fail-on-empty-changeset
          )

          max_attempts=2
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            if "${deploy_cmd[@]}"; then
              exit 0
            fi

            echo "SAM deploy attempt ${attempt}/${max_attempts} failed."
            echo "Recent failed CloudFormation events:"
            aws cloudformation describe-stack-events \
              --stack-name "${EFFECTIVE_SAM_STACK_NAME}" \
              --region "${EFFECTIVE_AWS_REGION}" \
              --query "StackEvents[?ResourceStatus=='CREATE_FAILED' || ResourceStatus=='UPDATE_FAILED' || ResourceStatus=='DELETE_FAILED'].[Timestamp,LogicalResourceId,ResourceType,ResourceStatusReason]" \
              --output table || true

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "SAM deploy failed after ${max_attempts} attempts."
              exit 1
            fi

            attempt=$((attempt + 1))
            echo "Retrying SAM deploy after 15 seconds..."
            sleep 15
          done

      - name: Resolve API base URL from stack outputs
        id: resolve-api-url
        env:
          EFFECTIVE_AWS_REGION: ${{ github.event.inputs.aws_region || env.AWS_REGION }}
          EFFECTIVE_SAM_STACK_NAME: ${{ github.event.inputs.sam_stack_name || env.SAM_STACK_NAME }}
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${EFFECTIVE_SAM_STACK_NAME}" \
            --region "${EFFECTIVE_AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiBaseUrl'].OutputValue" \
            --output text)

          if [ -z "${API_URL}" ] || [ "${API_URL}" = "None" ]; then
            echo "Failed to resolve ApiBaseUrl output from stack ${EFFECTIVE_SAM_STACK_NAME}" >&2
            exit 1
          fi

          echo "Resolved ApiBaseUrl=${API_URL}"
          echo "api_base_url=${API_URL}" >> "$GITHUB_OUTPUT"

      - name: Build frontend with resolved API URL
        env:
          VITE_API_BASE_URL: ${{ steps.resolve-api-url.outputs.api_base_url }}
        run: |
          npm --workspace tweeter-web run build

      # NOTE: Frontend artifact upload/deploy (e.g., to S3/CloudFront or container registry)
      # is intentionally left to the deployment environment. The build output is in
      # tweeter-web/dist and can be published using your chosen hosting strategy.
