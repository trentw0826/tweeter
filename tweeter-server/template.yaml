getFolloweesFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: getFolloweesFunction
    Description: Returns a page of followees for a user.
    Handler: follow/lambda/GetFolloweesLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /follow/getfollowees
          Method: POST

getFollowersFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: getFollowersFunction
    Description: Returns a page of followers for a user.
    Handler: follow/lambda/GetFollowersLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /follow/getfollowers
          Method: POST

followFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: followFunction
    Description: Creates a follower relationship between two users.
    Handler: follow/lambda/FollowLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /follow/follow
          Method: POST

unfollowFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: unfollowFunction
    Description: Removes a follower relationship between two users.
    Handler: follow/lambda/UnfollowLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /follow/unfollow
          Method: POST

getUserFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: getUserFunction
    Description: Returns profile information for a user.
    Handler: user/lambda/GetUserLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /user/get
          Method: POST

isFollowerFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: isFollowerFunction
    Description: Checks whether one user follows another user.
    Handler: user/lambda/IsFollowerLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /user/isfollower
          Method: POST

getFolloweeCountFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: getFolloweeCountFunction
    Description: Returns the number of users a given user follows.
    Handler: user/lambda/GetFolloweeCountLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /user/getfolloweecount
          Method: POST

getFollowerCountFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: getFollowerCountFunction
    Description: Returns the number of followers for a given user.
    Handler: user/lambda/GetFollowerCountLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /user/getfollowercount
          Method: POST

loginFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: loginFunction
    Description: Authenticates a user and returns session information.
    Handler: auth/lambda/LoginLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /auth/login
          Method: POST

registerFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: registerFunction
    Description: Registers a new user account.
    Handler: auth/lambda/RegisterLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /auth/register
          Method: POST

logoutFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: logoutFunction
    Description: Logs out the current user session.
    Handler: auth/lambda/LogoutLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /auth/logout
          Method: POST

getFeedItemsFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: getFeedItemsFunction
    Description: Returns a page of feed items for a user.
    Handler: status/lambda/GetFeedItemsLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /status/getfeeditems
          Method: POST

getStoryItemsFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: getStoryItemsFunction
    Description: Returns a page of story items for a user.
    Handler: status/lambda/GetStoryItemsLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /status/getstoryitems
          Method: POST

postStatusFunction:
  Type: AWS::Serverless::Function
  Properties:
    FunctionName: postStatusFunction
    Description: Creates a new status post for a user.
    Handler: status/lambda/PostStatusLambda.handler
    Policies: *commonPolicies
    Events:
      PostApi:
        Type: Api
        Properties:
          RestApiId: !Ref tweeterApi
          Path: /status/poststatus
          Method: POST
