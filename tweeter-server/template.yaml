AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SAM config for Tweeter server

Parameters:
  ApiStageName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
      - local
    Description: Deployment stage name used for the API Gateway stage and resource name suffixes.

#
# Global Lambda function properties. These apply to every Lambda function.
#
Globals:
  Function:
    Runtime: nodejs20.x
    CodeUri: ../
    Timeout: 30
    MemorySize: 128
    Environment:
      Variables:
        USERS_TABLE: !Ref usersTable
        AUTH_TOKENS_TABLE: !Ref authTokensTable
        AUTH_TOKEN_INACTIVITY_MINUTES: "30"
        FOLLOWS_TABLE: !Ref followsTable
        STORY_TABLE: !Ref storyTable
        FEED_TABLE: !Ref feedTable
        BUCKET_NAME: !Ref mediaBucket

#
# Reusable blocks of configuration. These are referenced throughout the template to avoid duplication.
# &identifier is used to define a reusable block, and *identifier is used to reference it.
#
Metadata:
  x-common-policies: &commonPolicies
    - AWSLambdaBasicExecutionRole
    - AmazonSESFullAccess
    - CloudWatchFullAccess
    - AmazonDynamoDBFullAccess
    - AmazonS3FullAccess
    - AmazonSQSFullAccess

  x-common-swagger-response-headers: &commonSwaggerResponseHeaders
    Access-Control-Allow-Origin:
      type: string

  x-common-function-metadata: &commonFunctionMetadata
    BuildMethod: esbuild
    BuildProperties:
      Format: cjs
      Minify: false
      Sourcemap: true
      Target: es2020

#
# AWS resource definitions
#
Resources:
  #
  # Web API
  #

  tweeterApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: tweeterApi
      StageName: !Ref ApiStageName
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE'"
        AllowHeaders: "'*'"
        AllowOrigin: "'*'"
      DefinitionBody:
        swagger: "2.0"
        info:
          title: Tweeter API
          version: "1.0"
        x-common-consumes: &commonConsumes
          - application/json
        x-common-produces: &commonProduces
          - application/json
        x-common-swagger-responses: &commonSwaggerResponses
          "200":
            description: OK
            headers: *commonSwaggerResponseHeaders
          "400":
            description: Bad Request
            headers: *commonSwaggerResponseHeaders
          "401":
            description: Unauthorized
            headers: *commonSwaggerResponseHeaders
          "500":
            description: Internal Server Error
            headers: *commonSwaggerResponseHeaders
        paths:
          /follow/getfollowees:
            post:
              summary: Get followees
              description: Returns a page of followees for a specified user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${getFolloweesFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /follow/getfollowers:
            post:
              summary: Get followers
              description: Returns a page of followers for a specified user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${getFollowersFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /follow/follow:
            post:
              summary: Follow user
              description: Creates a follow relationship for the authenticated user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${followFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /follow/unfollow:
            post:
              summary: Unfollow user
              description: Removes a follow relationship for the authenticated user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${unfollowFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /user/get:
            post:
              summary: Get user profile
              description: Retrieves a user profile by alias.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${getUserFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /user/isfollower:
            post:
              summary: Check follower relationship
              description: Checks whether one user follows another.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${isFollowerFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /user/getfolloweecount:
            post:
              summary: Get followee count
              description: Returns the number of accounts a user follows.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${getFolloweeCountFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /user/getfollowercount:
            post:
              summary: Get follower count
              description: Returns the number of followers for a user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${getFollowerCountFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /auth/login:
            post:
              summary: Log in
              description: Authenticates a user and returns session information.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${loginFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /auth/register:
            post:
              summary: Register account
              description: Registers a new user account and returns session information.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${registerFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /auth/logout:
            post:
              summary: Log out
              description: Invalidates the current authenticated session.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${logoutFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /status/getfeeditems:
            post:
              summary: Get feed items
              description: Returns a page of feed statuses for a user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${getFeedItemsFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /status/getstoryitems:
            post:
              summary: Get story items
              description: Returns a page of story statuses for a user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${getStoryItemsFunction.Arn}/invocations
              responses: *commonSwaggerResponses
          /status/poststatus:
            post:
              summary: Post status
              description: Posts a new status on behalf of the authenticated user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${postStatusFunction.Arn}/invocations
              responses: *commonSwaggerResponses

  #
  # SQS Queues  (This will become relevant in Milestone 4. For M3, leave this section commented out.)
  #

  #   MyQueue:
  #     Type: AWS::SQS::Queue
  #     Properties:
  #       QueueName: MyQueue

  #
  # Web API Lambda functions
  #

  getFolloweesFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Returns a page of followees for a specified user.
      FunctionName: getFolloweesFunction
      Handler: tweeter-server/src/follow/lambda/GetFolloweesLambda.handler
      Policies: *commonPolicies

  getFollowersFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Returns a page of followers for a specified user.
      FunctionName: getFollowersFunction
      Handler: tweeter-server/src/follow/lambda/GetFollowersLambda.handler
      Policies: *commonPolicies

  followFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Creates a follow relationship for the authenticated user.
      FunctionName: followFunction
      Handler: tweeter-server/src/follow/lambda/FollowLambda.handler
      Policies: *commonPolicies

  unfollowFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Removes a follow relationship for the authenticated user.
      FunctionName: unfollowFunction
      Handler: tweeter-server/src/follow/lambda/UnfollowLambda.handler
      Policies: *commonPolicies

  getUserFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Retrieves a user profile by alias.
      FunctionName: getUserFunction
      Handler: tweeter-server/src/user/lambda/GetUserLambda.handler
      Policies: *commonPolicies

  isFollowerFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Checks whether one user follows another.
      FunctionName: isFollowerFunction
      Handler: tweeter-server/src/user/lambda/IsFollowerLambda.handler
      Policies: *commonPolicies

  getFolloweeCountFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Returns the number of accounts a user follows.
      FunctionName: getFolloweeCountFunction
      Handler: tweeter-server/src/user/lambda/GetFolloweeCountLambda.handler
      Policies: *commonPolicies

  getFollowerCountFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Returns the number of followers for a user.
      FunctionName: getFollowerCountFunction
      Handler: tweeter-server/src/user/lambda/GetFollowerCountLambda.handler
      Policies: *commonPolicies

  loginFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Authenticates a user and returns session information.
      FunctionName: loginFunction
      Handler: tweeter-server/src/auth/lambda/LoginLambda.handler
      Policies: *commonPolicies

  registerFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Registers a new user account and returns session information.
      FunctionName: registerFunction
      Handler: tweeter-server/src/auth/lambda/RegisterLambda.handler
      Policies: *commonPolicies

  logoutFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Invalidates the current authenticated session.
      FunctionName: logoutFunction
      Handler: tweeter-server/src/auth/lambda/LogoutLambda.handler
      Policies: *commonPolicies

  getFeedItemsFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Returns a page of feed statuses for a user.
      FunctionName: getFeedItemsFunction
      Handler: tweeter-server/src/status/lambda/GetFeedItemsLambda.handler
      Policies: *commonPolicies

  getStoryItemsFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Returns a page of story statuses for a user.
      FunctionName: getStoryItemsFunction
      Handler: tweeter-server/src/status/lambda/GetStoryItemsLambda.handler
      Policies: *commonPolicies

  postStatusFunction:
    Type: AWS::Serverless::Function
    Metadata: *commonFunctionMetadata
    Properties:
      Description: Posts a new status on behalf of the authenticated user.
      FunctionName: postStatusFunction
      Handler: tweeter-server/src/status/lambda/PostStatusLambda.handler
      Policies: *commonPolicies

  getFolloweesPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref getFolloweesFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/follow/getfollowees

  getFollowersPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref getFollowersFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/follow/getfollowers

  followPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref followFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/follow/follow

  unfollowPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref unfollowFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/follow/unfollow

  getUserPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref getUserFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/user/get

  isFollowerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref isFollowerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/user/isfollower

  getFolloweeCountPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref getFolloweeCountFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/user/getfolloweecount

  getFollowerCountPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref getFollowerCountFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/user/getfollowercount

  loginPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref loginFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/auth/login

  registerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref registerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/auth/register

  logoutPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref logoutFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/auth/logout

  getFeedItemsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref getFeedItemsFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/status/getfeeditems

  getStoryItemsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref getStoryItemsFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/status/getstoryitems

  postStatusPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref postStatusFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${tweeterApi}/*/POST/status/poststatus
  #
  # SQS Queue Lambda Functions  (leave this section commented out for now)
  #

  #   MyQueueFunction:
  #     Type: AWS::Serverless::Function
  #     Properties:
  #       FunctionName: MyQueueFunction
  #       Handler: <PATH TO LAMBDA HANDLER>
  #       Policies: *commonPolicies
  #       Events:
  #         SQSTrigger:
  #           Type: SQS
  #           Properties:
  #             Queue: !GetAtt MyQueue.Arn
  #             Enabled: true

  #
  # DynamoDB Tables
  #

  usersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "tweeter-users-${ApiStageName}"
      AttributeDefinitions:
        - AttributeName: alias
          AttributeType: S
      KeySchema:
        - AttributeName: alias
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  authTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "tweeter-auth-tokens-${ApiStageName}"
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  followsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "tweeter-follows-${ApiStageName}"
      AttributeDefinitions:
        - AttributeName: followerAlias
          AttributeType: S
        - AttributeName: followeeAlias
          AttributeType: S
      KeySchema:
        - AttributeName: followerAlias
          KeyType: HASH
        - AttributeName: followeeAlias
          KeyType: RANGE
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: FolloweeIndex
          KeySchema:
            - AttributeName: followeeAlias
              KeyType: HASH
            - AttributeName: followerAlias
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1

  storyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "tweeter-story-${ApiStageName}"
      AttributeDefinitions:
        - AttributeName: userAlias
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: userAlias
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  feedTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "tweeter-feed-${ApiStageName}"
      AttributeDefinitions:
        - AttributeName: ownerAlias
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: ownerAlias
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  mediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      BucketName: !Sub "tweeter-media-${ApiStageName}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Suspended

  mediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref mediaBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowPublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action:
              - "s3:GetObject"
            Resource: !Sub "${mediaBucket.Arn}/*"

Outputs:
  ApiBaseUrl:
    Description: Base URL for the Tweeter API stage.
    Value: !Sub "https://${tweeterApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}"

  MediaBucketName:
    Description: Name of the S3 bucket used for media assets.
    Value: !Ref mediaBucket
