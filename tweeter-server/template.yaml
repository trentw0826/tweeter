  getFeedItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: getFeedItemsFunction
      Handler: status/lambda/GetFeedItemsLambda.handler
      Policies: *commonPolicies
      Events:
        PostApi:
          Type: Api
          Properties:
