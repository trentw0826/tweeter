            Path: /status/getfeeditems
            Method: POST

  getStoryItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: getStoryItemsFunction
      Handler: status/lambda/GetStoryItemsLambda.handler
      Policies: *commonPolicies
      Events:
        PostApi:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /status/getstoryitems
            Method: POST

  postStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: postStatusFunction
      Handler: status/lambda/PostStatusLambda.handler
      Policies: *commonPolicies
      Events:
        PostApi:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /status/poststatus
