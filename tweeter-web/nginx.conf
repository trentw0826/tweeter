server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: serve index.html for all non-file requests
  location / {
    try_files $uri /index.html;
  }

  # Simple health check endpoint
  location = /health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }
}
