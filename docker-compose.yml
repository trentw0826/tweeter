services:
  localstack:
    image: localstack/localstack:3.5.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: dynamodb,s3,sts
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: ${LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT:-1}
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  localstack-init:
    image: amazon/aws-cli:2.27.45
    entrypoint: ["sh", "-c", "sh ./docker/localstack/init-localstack.sh"]
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      LOCALSTACK_ENDPOINT: http://localstack:4566
      API_STAGE_NAME: ${API_STAGE_NAME:-local}
      LOCALSTACK_ACCOUNT_ID: ${LOCALSTACK_ACCOUNT_ID:-000000000000}
    volumes:
      - .:/workspace
    working_dir: /workspace

  frontend-preview:
    build:
      context: .
      dockerfile: tweeter-web/Dockerfile
      target: runtime
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:3000}
    image: tweeter-frontend-preview:latest
    ports:
      - "4173:80"
    restart: unless-stopped

volumes:
  localstack-data:
